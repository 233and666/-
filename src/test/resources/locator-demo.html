<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>元素定位演示页面</title>
    <style>
        .s_ipt { width: 300px; padding: 5px; }
        .btn   { padding: 5px 15px; }
        .hot-list { margin-top: 20px; }
        .title { color: #333; }
    </style>
</head>
<body>
<!-- 搜索区域 -->
<input id="kw" name="wd" class="s_ipt" type="text" placeholder="请输入搜索词"/>
<input id="su" name="submit" class="btn" type="submit" value="百度一下"/>

<!-- 导航链接 -->
<a href="/news">新闻</a>
<a href="/hao123">hao123</a>
<a href="/map">地图</a>
<a href="/video">视频</a>

<!-- 搜索热榜 -->
<div class="hot-list">
    <ul>
        <li><span class="title">今日热搜第一名</span></li>
        <li><span class="title">热搜词A</span></li>
        <li><span class="title">热搜词B</span></li>
    </ul>
</div>

<!-- 登录表单 -->
<form id="loginForm">
    <input name="username" type="text" placeholder="用户名"/>
    <input name="password" type="password" placeholder="密码"/>
    <button id="loginBtn">登录</button>
    <span class="error-msg" style="display:none;">用户名或密码错误</span>
</form>
</body>
</html>
