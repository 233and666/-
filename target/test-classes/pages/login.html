<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>系统登录</title>
    <style>
        body { font-family: Arial, sans-serif; background: #f5f5f5; }
        .login-container {
            width: 360px; margin: 100px auto; padding: 30px;
            background: white; border-radius: 8px; box-shadow: 0 2px 8px rgba(0,0,0,.15);
        }
        h2 { text-align: center; color: #333; }
        .form-group { margin-bottom: 16px; }
        label { display: block; margin-bottom: 4px; color: #666; font-size: 14px; }
        input[type="text"], input[type="password"] {
            width: 100%; padding: 10px; border: 1px solid #ddd;
            border-radius: 4px; box-sizing: border-box;
        }
        button {
            width: 100%; padding: 10px; background: #1890ff;
            color: white; border: none; border-radius: 4px;
            font-size: 16px; cursor: pointer;
        }
        button:hover { background: #40a9ff; }
        .error-msg { color: #ff4d4f; font-size: 13px; text-align: center;
            margin-top: 10px; display: none; }
    </style>
</head>
<body>
<div class="login-container">
    <h2>系统登录</h2>
    <form id="loginForm">
        <div class="form-group">
            <label for="username">用户名</label>
            <input type="text" id="username" name="username" placeholder="请输入用户名">
        </div>
        <div class="form-group">
            <label for="password">密码</label>
            <input type="password" id="password" name="password" placeholder="请输入密码">
        </div>
        <button type="button" id="loginBtn" onclick="doLogin()">登 录</button>
    </form>
    <div class="error-msg" id="errorMsg">用户名或密码错误</div>
</div>
<script>
    function doLogin() {
        var u = document.getElementById('username').value;
        var p = document.getElementById('password').value;
        if (u === 'admin' && p === '123456') {
            // 登录成功：跳转到欢迎页（实际项目中会发 AJAX 请求）
            window.location.href = 'welcome.html?user=' + u;
        } else {
            document.getElementById('errorMsg').style.display = 'block';
        }
    }
</script>
</body>
</html>
