<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>截图功能演示页面</title>
    <style>
        body { font-family: Arial, sans-serif; padding: 40px; background: #f0f2f5; }
        .card { background: white; padding: 30px; border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0,0,0,.1); max-width: 500px; margin: 0 auto; }
        h2 { color: #333; text-align: center; }
        label { display: block; margin: 12px 0 4px; color: #666; font-size: 14px; }
        input[type="text"] { width: 100%; padding: 10px; border: 1px solid #ddd;
            border-radius: 4px; box-sizing: border-box; font-size: 14px; }
        .btn { width: 100%; padding: 12px; margin-top: 20px; background: #1890ff;
            color: white; border: none; border-radius: 4px; font-size: 16px; cursor: pointer; }
        .btn:hover { background: #40a9ff; }
        #result { text-align: center; margin-top: 15px; font-size: 14px; color: green; }
    </style>
</head>
<body>
<div class="card">
    <h2>用户信息表单</h2>
    <form id="infoForm" onsubmit="return false;">
        <label for="name">姓名</label>
        <input type="text" id="name" name="name" placeholder="请输入姓名"/>

        <label for="email">邮箱</label>
        <input type="text" id="email" name="email" placeholder="请输入邮箱"/>

        <label for="phone">手机号</label>
        <input type="text" id="phone" name="phone" placeholder="请输入手机号"/>

        <button type="button" class="btn" id="submitBtn"
                onclick="document.getElementById('result').innerText='提交成功！'">
            提 交
        </button>
        <div id="result"></div>
    </form>
</div>
</body>
</html>
